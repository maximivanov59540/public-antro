name: Deploy Antro to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore "$GITHUB_WORKSPACE/Antro/Antro.sln"

      - name: Publish Blazor WebAssembly
        run: dotnet publish "$GITHUB_WORKSPACE/Antro/src/Antro.Web/Antro.Web.csproj" -c Release -o "$GITHUB_WORKSPACE/publish-antro"

      - name: Prepare GitHub Pages output
        run: |
          touch "$GITHUB_WORKSPACE/publish-antro/wwwroot/.nojekyll"
          cp "$GITHUB_WORKSPACE/publish-antro/wwwroot/index.html" "$GITHUB_WORKSPACE/publish-antro/wwwroot/404.html"
          ls -la "$GITHUB_WORKSPACE/publish-antro/wwwroot"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish-antro/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
