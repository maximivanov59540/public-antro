name: Deploy Antro to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Antro.sln

      - name: Publish Blazor WebAssembly
        run: dotnet publish src/Antro.Web/Antro.Web.csproj -c Release -o publish-antro

      - name: Fix base href for GitHub Pages project site
        run: |
          sed -i 's|<base href="/" />|<base href="/public-antro/" />|g' publish-antro/wwwroot/index.html

      - name: Prepare GitHub Pages files
        run: |
          touch publish-antro/wwwroot/.nojekyll
          cp publish-antro/wwwroot/index.html publish-antro/wwwroot/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish-antro/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
